- dir: wg-training
  name: Training
  mission_statement: >
    WG Training focuses on the development, deployment, and operation of distributed
    AI workloads on Kubernetes. It covers the entire model development lifecycle,
    including pre-training, post-training (such as LLM fine-tuning), hyperparameter
    optimization, reinforcement learning, and other techniques required to build,
    train, and run AI models at scale.

